services:
  backend:
    build: ./backend
    image: mtgr-leaderboard-backend:local
    container_name: MTGR-Backend
    environment:
      LEADERBOARD_SHEET_ID: "${LEADERBOARD_SHEET_ID:-15lRLvnGZCEnQrMAk7dDHRmMcobKFelYarlXns7KN7QQ}"
      LEADERBOARD_SHEET_GID: "${LEADERBOARD_SHEET_GID:-202072059}"
      GOOGLE_APPLICATION_CREDENTIALS: "/app/service_account.json"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-http://localhost:8080}"
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID:-}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET:-}"
      DISCORD_REDIRECT_URI: "${DISCORD_REDIRECT_URI:-http://localhost:8080/auth/discord/callback}"
      DISCORD_GUILD_ID: "${DISCORD_GUILD_ID:-}"
      DISCORD_HOST_ROLE_ID: "${DISCORD_HOST_ROLE_ID:-}"
      DISCORD_PLAYER_ROLE_ID: "${DISCORD_PLAYER_ROLE_ID:-}"
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN:-}"
      SESSION_SECRET: "${SESSION_SECRET:-}"
    volumes:
      - ./backend/service_account.json:/app/service_account.json:ro
      - ./backend/data:/app/data
    networks:
      - mtg-net
  frontend:
    build: .
    image: mtgr-frontend:local
    container_name: MTGR-Frontend
    ports:
      - "8080:80"
    environment:
      API_BACKEND_URL: "${API_BACKEND_URL:-http://mtg-card-importer:3000}"
      LEADERBOARD_SHEET_ID: "${LEADERBOARD_SHEET_ID:-15lRLvnGZCEnQrMAk7dDHRmMcobKFelYarlXns7KN7QQ}"
      LEADERBOARD_SHEET_GID: "${LEADERBOARD_SHEET_GID:-202072059}"
    depends_on:
      - backend
    networks:
      mtg-net:
        aliases:
          - MTGRL-Frontend

networks:
  mtg-net:
    external: true
